services:

  kovia-api:
    build:
      context: ./kovia-api
      dockerfile: Dockerfile
    image: kovia-api:latest
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3001
      DB_HOST: ${DB_HOST:?DB_HOST es obligatorio}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:?DB_NAME es obligatorio}
      DB_USER: ${DB_USER:?DB_USER es obligatorio}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD es obligatorio}
      DB_DIALECT: ${DB_DIALECT:-postgres}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET es obligatorio}
      AUTH_COOKIE_NAME: ${AUTH_COOKIE_NAME:-kovia_admin_token}
      AUTH_TOKEN_TTL_HOURS: ${AUTH_TOKEN_TTL_HOURS:-12}
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN es obligatorio}
    expose:
      - "3001"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kovia-api.rule=Host(`api.oscardev.software`)"
      - "traefik.http.routers.kovia-api.entrypoints=websecure"
      - "traefik.http.routers.kovia-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.kovia-api.loadbalancer.server.port=3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - kovia-net
      - dokploy-network

  kovia-form:
    build:
      context: ./kovia-form
      dockerfile: Dockerfile
      args:
        PUBLIC_API_URL: ${PUBLIC_API_URL:?PUBLIC_API_URL es obligatorio para build}
    image: kovia-form:latest
    restart: unless-stopped
    depends_on:
      kovia-api:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      HOST: 0.0.0.0
      PORT: 4321
      PUBLIC_API_URL: ${PUBLIC_API_URL:?PUBLIC_API_URL es obligatorio}
    expose:
      - "4321"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kovia-form.rule=Host(`form.oscardev.software`)"
      - "traefik.http.routers.kovia-form.entrypoints=websecure"
      - "traefik.http.routers.kovia-form.tls.certresolver=letsencrypt"
      - "traefik.http.services.kovia-form.loadbalancer.server.port=4321"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://172.23.0.4:4321/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - kovia-net
      - dokploy-network

  kovia-admin:
    build:
      context: ./kovia-admin
      dockerfile: Dockerfile
      args:
        VITE_ADMIN_API_URL: ${VITE_ADMIN_API_URL:?VITE_ADMIN_API_URL es obligatorio para build}
        VITE_FORM_URL_BASE: ${VITE_FORM_URL_BASE:?VITE_FORM_URL_BASE es obligatorio para build}
    image: kovia-admin:latest
    restart: unless-stopped
    depends_on:
      kovia-api:
        condition: service_healthy
    expose:
      - "80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kovia-admin.rule=Host(`admin.oscardev.software`)"
      - "traefik.http.routers.kovia-admin.entrypoints=websecure"
      - "traefik.http.routers.kovia-admin.tls.certresolver=letsencrypt"
      - "traefik.http.services.kovia-admin.loadbalancer.server.port=80"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - kovia-net
      - dokploy-network


networks:
  kovia-net:
    driver: bridge
  dokploy-network:
    external: true